version: "3.9"

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: fengy
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - minio_data:/data
    ports:
      - "19000:9000"
      - "19001:9001"

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      - postgres
      - redis
      - minio
      - qdrant
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src

  celery_worker:
    build: ./backend
    command: ["uv", "run", "celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=4"]
    env_file: ./backend/.env
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend/src:/app/src

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
