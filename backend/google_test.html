<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Google Login Test</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: monospace; padding: 40px; background: #111; color: #eee; }
    h2 { color: #aaa; }
    #token-box {
      margin-top: 20px;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 16px;
      word-break: break-all;
      white-space: pre-wrap;
      font-size: 12px;
      color: #7ec8e3;
      display: none;
    }
    #copy-btn {
      margin-top: 12px;
      padding: 8px 20px;
      background: #3a3aff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Google Login — id_token 测试工具</h2>
  <p style="color:#888">点击登录后，复制 id_token 到 Postman</p>

  <div id="g_id_onload"
    data-client_id="483633208916-kaafbujcuuojvmu600nefgcsv139kp5l.apps.googleusercontent.com"
    data-callback="onSignIn"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <div id="token-box"></div>
  <button id="copy-btn" onclick="copyToken()">复制 id_token</button>

  <script>
    let currentToken = "";

    function onSignIn(response) {
      currentToken = response.credential;
      const box = document.getElementById("token-box");
      box.style.display = "block";
      box.textContent = currentToken;
      document.getElementById("copy-btn").style.display = "inline-block";
    }

    function copyToken() {
      navigator.clipboard.writeText(currentToken).then(() => {
        document.getElementById("copy-btn").textContent = "已复制 ✓";
        setTimeout(() => document.getElementById("copy-btn").textContent = "复制 id_token", 2000);
      });
    }
  </script>
</body>
</html>
